name: Scrape Match

on:
  workflow_dispatch:
    inputs:
      cricbuzz_match_id:
        description: 'Cricbuzz match ID (from the URL)'
        required: true
      match_number:
        description: 'Match number for the CSV filename'
        required: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - name: Scrape scorecard
        run: node scrape-match.js ${{ github.event.inputs.cricbuzz_match_id }} ${{ github.event.inputs.match_number }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matches/
          if git diff --cached --quiet; then
            echo "No new match data"
          else
            git commit -m "Add match-${{ github.event.inputs.match_number }} data (scraped)"
            git push
          fi
